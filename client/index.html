<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Meridian — AI-Powered Sales Intelligence for Complex Deals</title>

    <!-- SEO Meta -->
    <meta name="description" content="Meridian is the AI deal intelligence layer that reads your sales conversations, maps the buying committee, and tells you exactly what to do next to win. Built for enterprise sales teams closing complex, multi-stakeholder deals." />
    <meta name="keywords" content="sales intelligence, AI sales, deal intelligence, buying committee, stakeholder mapping, MEDDIC, BANT, enterprise sales, CRM, sales AI, deal management, pre-meeting brief" />
    <meta name="author" content="Meridian Sales Intelligence" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://meridianos.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meridianos.ai/" />
    <meta property="og:title" content="Meridian — AI-Powered Sales Intelligence for Complex Deals" />
    <meta property="og:description" content="Stop guessing. Start knowing. Meridian reads your sales conversations, maps the buying committee, and tells you exactly what to do next to win." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663267900177/PHTFs288hUf3yaW9yWMkJw/meridian-logo-cropped_69e86f90.png" />
    <meta property="og:site_name" content="Meridian Sales Intelligence" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://meridianos.ai/" />
    <meta name="twitter:title" content="Meridian — AI-Powered Sales Intelligence for Complex Deals" />
    <meta name="twitter:description" content="Stop guessing. Start knowing. Meridian reads your sales conversations, maps the buying committee, and tells you exactly what to do next to win." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663267900177/PHTFs288hUf3yaW9yWMkJw/meridian-logo-cropped_69e86f90.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Meridian",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-powered sales intelligence platform that reads your sales conversations, maps the buying committee, and tells you exactly what to do next to win complex deals.",
      "url": "https://meridianos.ai",
      "offers": {
        "@type": "Offer",
        "price": "149",
        "priceCurrency": "USD",
        "description": "Pro plan at $149/user/month with 1,000 AI credits included"
      },
      "creator": {
        "@type": "Organization",
        "name": "Meridian Sales Intelligence",
        "url": "https://meridianos.ai"
      },
      "featureList": [
        "AI deal insight generation",
        "Stakeholder mapping with concentric circle layout",
        "Pre-meeting briefs per stakeholder",
        "Sales methodology support (MEDDIC, BANT, SPICED, custom)",
        "Meeting transcript analysis",
        "Confidence scoring with trend tracking",
        "AI-suggested next actions"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
